<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трансфер из аэропорта Мальпенса, Милан | Мalpensa Transfer</title>
    <meta name="description" content="Надёжный трансфер из аэропорта Мальпенса. Комфортные автомобили, англоязычные водители, фиксированные цены. Бронируйте онлайн от 90€.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #e6a919;
            --accent-hover: #f0b92d;
            --dark: #0f0f1a;
            --white: #ffffff;
            --gray-300: #b3b3cc;
            --gray-400: #9999b3;
            --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Inter, sans-serif;
            color: var(--white);
            background: var(--dark);
            line-height: 1.6;
        }
        .container { max-width: 1240px; margin: 0 auto; padding: 0 24px; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 36px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: var(--accent);
            color: var(--dark);
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 16px 0;
            background: rgba(15,15,26,0.95);
            backdrop-filter: blur(20px);
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--white);
            font-size: 20px;
            font-weight: 700;
        }
        .hero {
            min-height: 90vh;
            display: flex;
            align-items: center;
            padding: 60px 0;
            text-align: center;
        }
        .hero-title {
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 800;
            margin-bottom: 24px;
        }
        .hero-title .highlight {
            color: var(--accent);
        }
        .hero-subtitle {
            font-size: 20px;
            color: var(--gray-300);
            margin-bottom: 32px;
        }
        footer {
            padding: 60px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="#" class="logo">
                    <span>Malpensa<span style="color:var(--accent)">Transfer</span></span>
                </a>
            </div>
        </div>
    </header>
    
    <section class="hero">
        <div class="container">
            <h1 class="hero-title">
                Трансфер из аэропорта <span class="highlight">Мальпенса</span>
            </h1>
            <p class="hero-subtitle">
                Комфортные поездки из аэропорта Мальпенса в Милан, Комо и другие города
            </p>
            <a href="tel:+393331234567" class="btn btn-primary">
                <i class="fas fa-phone"></i> Забронировать трансфер
            </a>
        </div>
    </section>
    
    <footer>
        <div class="container">
            <p>&copy; 2025 Malpensa Transfer. Все права защищены.</p>
        </div>
    </footer>
</body>
</html>
